{% extends "base.html" %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">📮</div>

        <div class="auth-brand">
            <a href="{% url 'posts:list' %}" class="auth-logo">포인루트</a>
            <p class="auth-eyebrow">MAIL SENT</p>
            <h1>메일을 보냈어요</h1>
            <p>
                입력한 이메일 주소가 가입 정보와 일치하면 핀번호 재설정 안내 메일이 전송됩니다.
            </p>
        </div>

        <div class="auth-help-box">
            메일이 바로 안 올 수도 있어요.<br>
            1~5분 정도 기다린 뒤 스팸함이나 프로모션함도 확인해주세요.
        </div>

        <div class="auth-bottom">
            <a href="{% url 'accounts:login' %}">로그인 화면으로</a>
            <span>·</span>
            <a href="{% url 'account_reset_password' %}">다시 입력하기</a>
        </div>
    </div>
</section>

<style>
.auth-page {
    min-height: calc(100vh - 76px);
    padding: 58px 18px 80px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: radial-gradient(circle at top left, rgba(49, 87, 246, 0.08), transparent 34%), #f4f6fb;
}

.auth-card {
    width: min(100%, 460px);
    padding: 36px 32px 30px;
    border-radius: 28px;
    background: #ffffff;
    border: 1px solid #dfe5f0;
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
    text-align: center;
}

.auth-icon {
    font-size: 48px;
    margin-bottom: 12px;
}

.auth-logo {
    display: inline-block;
    margin-bottom: 18px;
    color: #3157f6;
    font-size: 28px;
    font-weight: 950;
    letter-spacing: -0.06em;
    text-decoration: none;
}

.auth-eyebrow {
    margin: 0 0 8px;
    color: #3157f6;
    font-size: 11px;
    font-weight: 950;
    letter-spacing: 0.16em;
}

.auth-brand h1 {
    margin: 0;
    color: #111827;
    font-size: 30px;
    line-height: 1.18;
    font-weight: 950;
    letter-spacing: -0.06em;
}

.auth-brand p:last-child {
    margin: 12px 0 0;
    color: #667085;
    font-size: 14px;
    line-height: 1.65;
    font-weight: 650;
}

.auth-help-box {
    margin-top: 22px;
    padding: 16px;
    border-radius: 16px;
    background: #f8faff;
    border: 1px dashed #b9c7ff;
    color: #667085;
    font-size: 14px;
    font-weight: 750;
    line-height: 1.6;
}

.auth-bottom {
    margin-top: 22px;
    padding-top: 20px;
    border-top: 1px solid #eef1f6;
    display: flex;
    justify-content: center;
    gap: 8px;
    color: #667085;
    font-size: 14px;
    font-weight: 750;
}

.auth-bottom a {
    color: #3157f6;
    font-weight: 900;
    text-decoration: none;
}
</style>
{% endblock %}
