{% extends "base.html" %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-icon">🎉</div>

        <div class="auth-brand">
            <a href="{% url 'posts:list' %}" class="auth-logo">포인루트</a>
            <p class="auth-eyebrow">PIN CHANGED</p>
            <h1>새 핀번호로 바뀌었어요</h1>
            <p>
                이제 포인루트 아이디와 새 핀번호로 다시 로그인할 수 있어요.
            </p>
        </div>

        <div class="auth-bottom">
            <a href="{% url 'accounts:login' %}">로그인하러 가기</a>
            <span>·</span>
            <a href="{% url 'posts:list' %}">홈으로 가기</a>
        </div>
    </div>
</section>

<style>
.auth-page {
    min-height: calc(100vh - 76px);
    padding: 58px 18px 80px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: radial-gradient(circle at top left, rgba(49, 87, 246, 0.08), transparent 34%), #f4f6fb;
}

.auth-card {
    width: min(100%, 460px);
    padding: 36px 32px 30px;
    border-radius: 28px;
    background: #ffffff;
    border: 1px solid #dfe5f0;
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
    text-align: center;
}

.auth-icon {
    font-size: 48px;
    margin-bottom: 12px;
}

.auth-logo {
    display: inline-block;
    margin-bottom: 18px;
    color: #3157f6;
    font-size: 28px;
    font-weight: 950;
    letter-spacing: -0.06em;
    text-decoration: none;
}

.auth-eyebrow {
    margin: 0 0 8px;
    color: #3157f6;
    font-size: 11px;
    font-weight: 950;
    letter-spacing: 0.16em;
}

.auth-brand h1 {
    margin: 0;
    color: #111827;
    font-size: 30px;
    line-height: 1.18;
    font-weight: 950;
    letter-spacing: -0.06em;
}

.auth-brand p:last-child {
    margin: 12px 0 0;
    color: #667085;
    font-size: 14px;
    line-height: 1.65;
    font-weight: 650;
}

.auth-bottom {
    margin-top: 22px;
    padding-top: 20px;
    border-top: 1px solid #eef1f6;
    display: flex;
    justify-content: center;
    gap: 8px;
    color: #667085;
    font-size: 14px;
    font-weight: 750;
}

.auth-bottom a {
    color: #3157f6;
    font-weight: 900;
    text-decoration: none;
}
</style>
{% endblock %}
